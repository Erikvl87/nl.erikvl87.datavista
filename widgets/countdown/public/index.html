<html>
	<head>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				height: 100vh;
				overflow: hidden;
				position: relative;
			}

			.homey-widget {
				display: flex;
				flex-direction: column;
				align-items: stretch;
				height: 100%;
				padding: var(--homey-su-3) var(--homey-su-4) var(--homey-su-4);
				position: relative;
			}

			/* ── Particle canvas (particles style only) ── */
			#particle-canvas {
				display: none;
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				pointer-events: none;
			}

			/* ── Title ── */
			#title {
				flex-shrink: 0;
				text-align: left;
				overflow: hidden;
				white-space: nowrap;
				text-overflow: ellipsis;
			}

			/* Inner span used by static styles so scheduleMarqueeCheck can measure scrollWidth */
			#title .title-text {
				display: inline-block;
				white-space: nowrap;
			}

			/* ── Main container ── */
			#countdown-container {
				position: relative;
				z-index: 1;
				flex: 1;
				min-height: 0;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				gap: 4px;
			}

			/* ── Units row ── */
			#units-row {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0;
				width: 100%;
			}

			.unit {
				display: flex;
				flex-direction: column;
				align-items: center;
				min-width: 42px;
			}

			.unit .value {
				font-size: 28px;
				font-weight: 600;
				line-height: 1;
				letter-spacing: -0.5px;
				color: var(--countdown-accent, var(--homey-text-color));
				font-variant-numeric: tabular-nums;
			}

			.unit .label {
				font-size: 10px;
				color: var(--homey-text-color-light, var(--homey-text-color));
				opacity: 0.6;
				text-transform: lowercase;
				margin-top: 2px;
			}

			.unit-sep {
				font-size: 22px;
				font-weight: 300;
				color: var(--homey-text-color);
				opacity: 0.35;
				padding: 0 2px;
				margin-bottom: 14px;
				line-height: 1;
			}

			/* ── Completion message ── */
			#completion-message {
				display: none;
				font-size: 18px;
				font-weight: 600;
				text-align: center;
				color: var(--countdown-accent, var(--homey-text-color));
				padding: 4px 8px;
				animation: pulse 2s ease-in-out infinite;
			}

			@keyframes pulse {
				0%, 100% { transform: scale(1); opacity: 1; }
				50% { transform: scale(1.04); opacity: 0.85; }
			}

			@keyframes fadeIn {
				from { opacity: 0; transform: scale(0.92); }
				to { opacity: 1; transform: scale(1); }
			}

			.completion-visible {
				animation: fadeIn 0.6s ease-out forwards, pulse 2s ease-in-out 0.6s infinite !important;
			}

			/* ══════════════════════════════════════
			   STYLE: BLOCKS
			   ══════════════════════════════════════ */
			.blocks .unit-sep {
				display: none;
			}

			.blocks #units-row {
				gap: 8px;
			}

			.blocks .unit {
				position: relative;
				background:
					linear-gradient(
						180deg,
						var(--homey-color-mono-100, rgba(255, 255, 255, 0.06)) 0%,
						var(--homey-color-mono-200, rgba(0, 0, 0, 0.08)) 100%
					);
				border: 1px solid var(--countdown-accent-20);
				border-radius: 10px;
				padding: 12px 10px 6px;
				min-width: 54px;
				overflow: hidden;
				box-shadow:
					0 2px 6px rgba(0, 0, 0, 0.12),
					inset 0 1px 0 rgba(255, 255, 255, 0.08);
			}

			.blocks .unit::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 3px;
				background: var(--countdown-accent);
				opacity: 0.85;
			}

			.blocks .unit .value {
				font-size: 26px;
				font-weight: 700;
			}

			.blocks .unit .label {
				font-size: 9px;
				font-weight: 600;
				margin-top: 4px;
				padding-top: 4px;
				width: 100%;
				text-align: center;
				text-transform: uppercase;
				letter-spacing: 0.6px;
				opacity: 0.7;
				border-top: 1px solid var(--homey-color-mono-300, rgba(128, 128, 128, 0.18));
			}

			/* ══════════════════════════════════════
			   STYLE: FLIP (split-flap train station clock)
			   ══════════════════════════════════════ */
			.flip #units-row {
				gap: 6px;
			}

			.flip .unit-sep {
				font-family: 'Courier New', 'Menlo', monospace;
				font-size: 22px;
				font-weight: 700;
				color: var(--homey-text-color);
				opacity: 0.35;
				padding: 0;
				margin: 0 -3px 14px;
			}

			.flip .unit {
				min-width: 0;
				padding: 0;
				background: transparent;
			}

			.flip .unit .value {
				display: inline-flex;
				gap: 2px;
				perspective: 220px;
			}

			/* Positioned 3D container — no card styling here */
			.flip .unit .value .digit {
				position: relative;
				display: inline-block;
				transform-style: preserve-3d;
				box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
			}

			/* Center divider line — always on top of all layers */
			.flip .unit .value .digit::after {
				content: '';
				position: absolute;
				left: 0;
				right: 0;
				top: 50%;
				height: 1px;
				background: rgba(0, 0, 0, 0.85);
				box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
				pointer-events: none;
				z-index: 4;
			}

			/* Shared card appearance for all three layers */
			.flip .unit .value .digit .d-back,
			.flip .unit .value .digit .d-bot,
			.flip .unit .value .digit .d-top {
				min-width: 24px;
				padding: 8px 4px 6px;
				background: linear-gradient(
					180deg,
					#2e2e33 0%,
					#383840 49.5%,
					#1a1a1e 50%,
					#252528 100%
				);
				border-radius: 5px;
				color: #ffffff;
				font-family: 'Courier New', 'Menlo', monospace;
				font-size: 30px;
				font-weight: 700;
				text-align: center;
				text-shadow: 0 0 8px rgba(255, 255, 255, 0.25), 0 1px 2px rgba(0, 0, 0, 0.8);
			}

			/* Back card: in normal flow to size .digit, shows the NEXT value */
			.flip .unit .value .digit .d-back {
				display: block;
				z-index: 1;
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.10),
					inset 0 -1px 0 rgba(0, 0, 0, 0.6);
			}

			/* Bottom half: static, covers d-back's bottom with the current value */
			.flip .unit .value .digit .d-bot {
				position: absolute;
				inset: 0;
				display: block;
				clip-path: inset(50% 0 0 0);
				z-index: 2;
				box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.6);
			}

			/* Top flap: animated — clips to top half, rotates away to reveal d-back */
			.flip .unit .value .digit .d-top {
				position: absolute;
				inset: 0;
				display: block;
				clip-path: inset(0 0 50% 0);
				transform-origin: center 50%;
				backface-visibility: hidden;
				will-change: transform;
				z-index: 3;
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10);
			}

			@keyframes flip-top {
				0%   { transform: rotateX(0deg); }
				100% { transform: rotateX(-90deg); }
			}

			.flip .unit .value .digit .d-top.flipping {
				animation: flip-top 0.18s ease-in forwards;
			}

			.flip .unit .label {
				margin-top: 6px;
				font-size: 9px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 1.2px;
				opacity: 0.6;
			}

			.flip #completion-message {
				color: var(--countdown-accent, #f5ead0);
			}

			/* ══════════════════════════════════════
			   STYLE: PARTICLES
			   ══════════════════════════════════════ */
			.particles {
				background: transparent !important;
			}

			.particles #particle-canvas {
				display: block;
			}

			.particles #countdown-container {
				background: transparent;
				border-radius: 10px;
				padding: 8px 16px 6px;
			}

			.particles .unit .value {
				font-weight: 700;
			}

			.particles .unit .label {
				color: var(--countdown-accent-50);
				opacity: 1;
			}

			.particles .unit-sep {
				color: var(--homey-text-color);
				opacity: 0.35;
			}

			.particles #completion-message {
				color: var(--countdown-accent);
				text-shadow:
					0 0 8px var(--countdown-accent-90),
					0 0 20px var(--countdown-accent-30);
			}

			/* ══════════════════════════════════════
			   STYLE: HOURGLASS
			   ══════════════════════════════════════ */
			#hourglass-wrap {
				display: none;
			}

			/* Shared dissolve animation for any element that fades out on completion */
			.dissolve-host {
				transition: opacity 0.25s ease, transform 0.25s ease;
			}

			.dissolve-host.dissolving {
				opacity: 0;
				transform: scale(0.92);
				pointer-events: none;
				position: absolute;
			}

			/* SVG <g> elements don't use HTML positioning, and CSS transform-origin
			   on SVG groups doesn't center predictably across browsers — keep the
			   completion fade pure-opacity for the hourglass scene group. */
			#hg-scene.dissolving {
				transform: none;
				position: static;
			}

			#hourglass {
				display: block;
				width: 100%;
				height: auto;
				overflow: visible;
			}

			.hg-glass {
				fill: url(#hg-glass-top);
				stroke: rgba(255, 255, 255, 0.30);
				stroke-width: 0.5;
				stroke-linejoin: round;
			}

			.hg-glass-bot {
				fill: url(#hg-glass-bot);
				stroke: rgba(255, 255, 255, 0.30);
				stroke-width: 0.5;
				stroke-linejoin: round;
			}

			.hg-neck {
				fill: url(#hg-neck-grad);
				stroke: rgba(255, 255, 255, 0.18);
				stroke-width: 0.4;
			}

			.hg-sand {
				fill: #f0e8d0;
			}

			.hg-grain {
				fill: #f0e8d0;
			}

			.hourglass #hourglass-wrap {
				display: block;
				width: 100%;
			}

			.hourglass.homey-widget {
				padding: 0;
				background: #2a1a0a;
			}

			/* ── Brass nameplate label ── */
			/* The brass plaque is rendered inside the hourglass SVG itself (#hg-plaque),
			   so the HTML #title element is unused for the hourglass style. */
			.hourglass #title {
				display: none;
			}

			.hourglass #countdown-container {
				gap: 6px;
				justify-content: flex-start;
			}

			/* The countdown is engraved on the brass plate inside the SVG scene, so the
			   HTML units row and any centred completion banner are suppressed entirely. */
			.hourglass #units-row,
			.hourglass #completion-message {
				display: none !important;
			}

			/* Completion embers: small golden motes rise out of the hourglass bottom bulb
			   once the countdown hits zero — same celebration role the confetti plays for
			   the racecar style, but kept quiet and warm to fit the candlelit study. */
			.hg-ember {
				opacity: 0;
				transform-box: fill-box;
				transform-origin: center;
			}

			.hourglass.hourglass-completed .hg-ember {
				animation: hg-ember-rise 2.6s ease-in-out infinite;
			}

			.hourglass.hourglass-completed #hg-embers circle:nth-child(1) { animation-delay: 0s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(2) { animation-delay: 0.35s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(3) { animation-delay: 0.70s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(4) { animation-delay: 1.05s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(5) { animation-delay: 1.40s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(6) { animation-delay: 1.75s; }
			.hourglass.hourglass-completed #hg-embers circle:nth-child(7) { animation-delay: 2.10s; }

			@keyframes hg-ember-rise {
				0%   { transform: translate(0, 0) scale(0.4); opacity: 0; }
				15%  { opacity: 0.95; }
				100% { transform: translate(var(--hg-ember-dx, 0px), -42px) scale(1.15); opacity: 0; }
			}

			/* Plate carrying the running countdown fades out on completion — the parchment
			   plaque already shows the completion message, so the time becomes redundant. */
			#hg-time-plate {
				transition: opacity 0.5s ease-out;
			}

			.hourglass.hourglass-completed #hg-time-plate {
				opacity: 0;
			}

			/* Plaque text pulses with a soft warm halo once the timer completes. */
			#hg-plaque-text {
				transition: filter 0.4s ease;
			}

			.hourglass.hourglass-completed #hg-plaque-text {
				animation: hg-plaque-glow 2.4s ease-in-out infinite;
			}

			@keyframes hg-plaque-glow {
				0%, 100% { filter: drop-shadow(0 0 0 rgba(255,200,120,0)); }
				50%      { filter: drop-shadow(0 0 1.2px rgba(255,200,120,0.85)); }
			}

			/* Plaque text ticker — scrolls when label is too long to fit the parchment */
			@keyframes hg-marquee {
				0%, 20%  { transform: translateX(0); }
				100%     { transform: translateX(calc(-1 * var(--hg-marquee-shift, 0px))); }
			}
			#hg-plaque-text.hg-marquee {
				animation: hg-marquee var(--hg-marquee-dur, 8s) linear infinite;
			}

			/* ══════════════════════════════════════
			   STYLE: RINGS
			   ══════════════════════════════════════ */
			.unit .ring {
				display: none;
			}

			.rings .unit-sep {
				display: none;
			}

			.rings #units-row {
				gap: 8px;
			}

			.rings .unit {
				position: relative;
				width: 50px;
				min-width: 50px;
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			.rings .unit .ring {
				display: block;
				width: 50px;
				height: 50px;
				transform: rotate(-90deg);
			}

			.rings .unit .ring-bg {
				fill: none;
				stroke: var(--homey-color-mono-300, rgba(128, 128, 128, 0.20));
				stroke-width: 2.5;
			}

			.rings .unit .ring-fg {
				fill: none;
				stroke: var(--countdown-accent, var(--homey-text-color));
				stroke-width: 2.5;
				stroke-linecap: round;
				stroke-dasharray: 97.39;
				stroke-dashoffset: 0;
				transition: stroke-dashoffset 0.4s ease;
			}

			.rings .unit .value {
				position: absolute;
				top: 25px;
				left: 0;
				right: 0;
				transform: translateY(-50%);
				text-align: center;
				font-size: 16px;
				font-weight: 600;
				font-variant-numeric: tabular-nums;
				color: var(--homey-text-color);
				line-height: 1;
			}

			.rings .unit .label {
				font-size: 9px;
				margin-top: 2px;
				text-transform: uppercase;
				letter-spacing: 0.4px;
				opacity: 0.55;
			}

			.rings #completion-message {
				color: var(--countdown-accent);
			}

			/* ══════════════════════════════════════
			   STYLE: RACECAR
			   ══════════════════════════════════════ */
			#racecar-wrap {
				display: none;
				width: 100%;
			}

			#racecar {
				display: block;
				width: 100%;
				height: auto;
			}

			/* Car body uses the user-chosen accent color */
			.rc-body {
				fill: var(--countdown-accent, #d4a55a);
			}

			/* Checkered-flag + confetti are hidden during countdown, revealed on completion */
			.rc-flag,
			.rc-confetti {
				opacity: 0;
				transition: opacity 0.4s ease;
			}

			/* Subtle motion lines trailing the car */
			.rc-speedlines rect {
				fill: rgba(255, 255, 255, 0.55);
				animation: rc-speed 0.5s ease-in-out infinite;
			}
			.rc-speedlines rect:nth-child(2) { animation-delay: 0.12s; }
			.rc-speedlines rect:nth-child(3) { animation-delay: 0.24s; }

			@keyframes rc-speed {
				0%, 100% { opacity: 0.7; transform: translateX(0); }
				50%      { opacity: 0.15; transform: translateX(-2px); }
			}

			/* Wheel spin (only when racing) */
			.rc-wheel-spin {
				transform-box: fill-box;
				transform-origin: center;
				animation: rc-spin 0.18s linear infinite;
			}

			@keyframes rc-spin {
				to { transform: rotate(360deg); }
			}

			.racecar #racecar-wrap {
				display: block;
			}

			/* Remove widget padding so SVG scenes run edge-to-edge */
			.racecar.homey-widget,
			.racehorse.homey-widget {
				padding: 0;
			}

			/* Racecar: green background + sign+track pushed to bottom; ~40px of grass shows as sky above */
			.racecar.homey-widget {
				background: rgba(100, 155, 70, 0.55);
				justify-content: flex-end;
			}

			.racecar #countdown-container,
			.racehorse #countdown-container {
				gap: 6px;
			}

			/* Racecar: countdown-container sizes to SVG only (sky fills the rest via widget background) */
			.racecar #countdown-container {
				justify-content: flex-start;
				flex: none;
			}

			/* Racehorse: sign at widget top edge, horse SVG at bottom of the flex-1 container */
			.racehorse #countdown-container {
				justify-content: flex-end;
			}

			/* Race styles: time is shown in the ad board — units row is not used */
			.racecar #units-row,
			.racehorse #units-row {
				display: none !important;
			}

			.racecar .unit,
			.racehorse .unit {
				min-width: 0;
				padding: 0 1px;
			}

			.racecar .unit .value,
			.racehorse .unit .value {
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 18px;
				font-weight: 700;
				line-height: 1;
				color: var(--countdown-clock, #ffb300);
				letter-spacing: 0.6px;
				font-variant-numeric: tabular-nums;
				text-shadow:
					0 0 4px var(--countdown-clock-85, rgba(255, 179, 0, 0.85)),
					0 0 9px var(--countdown-clock-40, rgba(255, 140, 0, 0.4)),
					0 1px 0 rgba(0, 0, 0, 0.6);
			}

			.racecar .unit .label,
			.racehorse .unit .label {
				display: block;
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 9px;
				line-height: 1;
				margin-top: 1px;
				color: var(--countdown-clock, #ffb300);
				opacity: 0.75;
				text-transform: lowercase;
				letter-spacing: 0.5px;
				text-shadow: 0 0 3px var(--countdown-clock-40, rgba(255, 140, 0, 0.4));
			}

			.racecar .unit-sep,
			.racehorse .unit-sep {
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 18px;
				font-weight: 700;
				line-height: 1;
				color: var(--countdown-clock, #ffb300);
				opacity: 0.95;
				padding: 0 1px;
				margin-bottom: 10px;
				text-shadow:
					0 0 4px var(--countdown-clock-70, rgba(255, 179, 0, 0.7)),
					0 1px 0 rgba(0, 0, 0, 0.6);
				animation: rc-colon-blink 1s steps(1) infinite;
			}

			@keyframes rc-colon-blink {
				0%, 50%      { opacity: 0.95; }
				50.01%, 100% { opacity: 0.25; }
			}

			.racecar #completion-message,
			.racehorse #completion-message {
				color: var(--countdown-accent);
			}

			/* ── Race styles: title as F1 trackside ad board ── */
			.racecar #title,
			.racehorse #title {
				font-family: 'Arial Black', 'Arial', sans-serif;
				font-size: 11px;
				font-weight: 900;
				font-style: italic;
				letter-spacing: 0.8px;
				text-transform: uppercase;
				white-space: nowrap;
				text-overflow: ellipsis;
				color: #111;
				border: 1.5px solid #1a1a1a;
				border-radius: 2px;
				padding: 3px 8px 3px 22px;
				position: relative;
				box-shadow:
					0 2px 0 #111,
					0 3px 6px rgba(0, 0, 0, 0.55);
			}

			/* Racecar: clean white ad board — border wraps only the white face */
			.racecar #title {
				background: #f5f5f5;
				overflow: hidden;
				margin: 0 14px;
				transform: skewX(12deg);
				/* shared rule supplies padding-left: 22px (16px accent tab + ~6px gap) */
			}

			/* Accent colour tab — flush at the left edge of the white board */
			.racecar #title::before {
				content: '';
				position: absolute;
				left: 0;
				top: 0;
				bottom: 0;
				width: 16px;
				background: var(--countdown-accent, #e10600);
				border-right: 1.5px solid #1a1a1a;
			}

			/* Racehorse: full-width board to hold label | time — upright, no skew */
			.racehorse #title {
				background: #f5f5f5;
				padding: 4px 10px;
				margin: 0 14px;
				overflow: visible;
				z-index: 2;
				font-style: normal;
			}

			/* Left mounting pole — straight */
			.racehorse #title::before {
				content: '';
				position: absolute;
				top: 100%;
				left: 16%;
				width: 3px;
				height: 22px;
				background: linear-gradient(to bottom, #999, #555);
				border-radius: 0 0 2px 2px;
			}

			/* Right mounting pole — straight */
			.racehorse #title::after {
				content: '';
				position: absolute;
				top: 100%;
				right: 16%;
				width: 3px;
				height: 22px;
				background: linear-gradient(to bottom, #999, #555);
				border-radius: 0 0 2px 2px;
			}

			/* ── Race ad board: label | time inline layout ── */
			.racecar #title .rc-board-clip,
			.racehorse #title .rc-board-clip {
				display: flex;
				align-items: center;
				overflow: hidden;
			}

			/* Label and message wrappers: flex-grow, clip content that overflows */
			.racecar #title .rc-board-clip .rc-label-wrap,
			.racehorse #title .rc-board-clip .rc-label-wrap,
			.racecar #title .rc-board-clip .rc-msg-wrap,
			.racehorse #title .rc-board-clip .rc-msg-wrap {
				flex: 1;
				min-width: 0;
				overflow: hidden;
			}

			/* Inline-block so scrollWidth reports the true text width for marquee calculation */
			.racecar #title .rc-board-clip .rc-label,
			.racehorse #title .rc-board-clip .rc-label,
			.racecar #title .rc-board-clip .rc-msg,
			.racehorse #title .rc-board-clip .rc-msg {
				display: inline-block;
				white-space: nowrap;
			}

			.racecar #title .rc-board-clip .rc-sep,
			.racehorse #title .rc-board-clip .rc-sep {
				flex-shrink: 0;
				opacity: 0.4;
				padding: 0 4px;
			}

			/* Separator leans ╲: positive skewX pushes bottom right. Remove italic first,
			   then parent's +12deg + own +12deg = 24deg net toward ╲ */
			.racecar #title .rc-board-clip .rc-sep {
				transform: skewX(12deg);
				font-style: normal;
			}

			/* Racecar time leans ╲ at the same angle as the separator */
			.racecar #title .rc-board-clip .rc-time {
				transform: skewX(12deg);
			}

			/* Racecar: label leans ╲ with the board (matches sep + time) */
			.racecar #title .rc-board-clip .rc-label {
				transform: skewX(12deg);
			}


			.racecar #title .rc-board-clip .rc-time,
			.racehorse #title .rc-board-clip .rc-time {
				flex-shrink: 0;
				font-variant-numeric: tabular-nums;
				letter-spacing: 0.5px;
			}

			/* Solo time (no label): center it */
			.racecar #title .rc-board-clip .rc-time--solo,
			.racehorse #title .rc-board-clip .rc-time--solo {
				flex: 1;
				text-align: center;
				letter-spacing: 1px;
			}

			/* Marquee: scroll label/message text that is wider than the board */
			@keyframes rc-marquee {
				0%, 20%  { transform: translateX(0); }
				100%     { transform: translateX(calc(-1 * var(--rc-marquee-shift, 0px))); }
			}

			.rc-label.marquee,
			.rc-msg.marquee,
			.title-text.marquee {
				animation: rc-marquee var(--rc-marquee-dur, 8s) linear infinite;
			}

			/* Completion: stop wheel spin and speed lines, reveal flag + confetti */
			.racecar.racecar-completed .rc-wheel-spin {
				animation: none;
			}

			.racecar.racecar-completed .rc-speedlines {
				opacity: 0;
				transition: opacity 0.3s ease;
			}

			.racecar.racecar-completed .rc-flag,
			.racecar.racecar-completed .rc-confetti {
				opacity: 1;
			}

			.rc-flag-wave {
				transform-box: fill-box;
				transform-origin: 0% 50%;
			}

			.racecar.racecar-completed .rc-flag-wave {
				animation: rc-wave 0.7s ease-in-out infinite;
			}

			@keyframes rc-wave {
				0%, 100% { transform: skewX(-10deg) scaleY(1); }
				50%      { transform: skewX(10deg)  scaleY(0.88); }
			}

			.rc-confetti circle {
				transform-box: fill-box;
				transform-origin: center;
			}

			.racecar.racecar-completed .rc-confetti circle {
				animation: rc-confetti 1.6s ease-in-out infinite;
			}

			.racecar.racecar-completed .rc-confetti circle:nth-child(1) { animation-delay: 0s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(2) { animation-delay: 0.18s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(3) { animation-delay: 0.36s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(4) { animation-delay: 0.54s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(5) { animation-delay: 0.72s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(6) { animation-delay: 0.90s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(7) { animation-delay: 1.08s; }
			.racecar.racecar-completed .rc-confetti circle:nth-child(8) { animation-delay: 1.26s; }

			@keyframes rc-confetti {
				0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
				15%  { opacity: 1; }
				100% { transform: translate(var(--rc-cx, 0px), 18px) scale(0.9); opacity: 0; }
			}

			/* ══════════════════════════════════════
			   STYLE: RACEHORSE
			   ══════════════════════════════════════ */
			#racehorse-wrap {
				display: none;
				width: 100%;
			}

			#racehorse {
				display: block;
				width: 100%;
				height: auto;
			}

			/* Horse coat — dark bay so it reads clearly against the dirt track.
			   The horse never picks up the accent — that goes on the jockey silks. */
			.rh-coat {
				fill: #3a2618;
			}

			.rh-coat-shade {
				fill: #1f1208;
			}

			/* Jockey silks pick up the user-chosen accent colour */
			.rh-silks {
				fill: var(--countdown-accent, #c43b3b);
			}

			/* Trophy + confetti hidden during countdown, revealed on completion */
			.rh-trophy,
			.rh-confetti {
				opacity: 0;
				transition: opacity 0.5s ease-out;
			}

			/* Dust kicked up behind the horse while galloping */
			.rh-dust circle {
				transform-box: fill-box;
				transform-origin: center;
				animation: rh-dust 0.7s ease-out infinite;
				opacity: 0;
			}
			.rh-dust circle:nth-child(2) { animation-delay: 0.22s; }
			.rh-dust circle:nth-child(3) { animation-delay: 0.44s; }

			@keyframes rh-dust {
				0%   { transform: translate(0, 0) scale(0.5); opacity: 0.7; }
				100% { transform: translate(-7px, -1.5px) scale(1.5); opacity: 0; }
			}

			/* Gallop: two leg-frame groups alternate every 120ms (≈4Hz) */
			.rh-legs-a,
			.rh-legs-b {
				animation-duration: 0.24s;
				animation-iteration-count: infinite;
				animation-timing-function: steps(1);
			}
			.rh-legs-a { animation-name: rh-frame-a; }
			.rh-legs-b { animation-name: rh-frame-b; }
			.rh-legs-stand { opacity: 0; }

			@keyframes rh-frame-a {
				0%, 49%   { opacity: 1; }
				50%, 100% { opacity: 0; }
			}
			@keyframes rh-frame-b {
				0%, 49%   { opacity: 0; }
				50%, 100% { opacity: 1; }
			}

			/* Subtle vertical bob synchronised with the gallop */
			.rh-body-bob {
				animation: rh-bob 0.24s ease-in-out infinite;
			}
			@keyframes rh-bob {
				0%, 100% { transform: translateY(0); }
				50%      { transform: translateY(-0.7px); }
			}

			/* Tail swish */
			.rh-tail {
				transform-box: fill-box;
				transform-origin: 100% 30%;
				animation: rh-tail-swish 0.7s ease-in-out infinite alternate;
			}
			@keyframes rh-tail-swish {
				0%   { transform: rotate(-7deg); }
				100% { transform: rotate(9deg); }
			}

			/* Mane flap */
			.rh-mane {
				transform-box: fill-box;
				transform-origin: 0% 100%;
				animation: rh-mane-flap 0.55s ease-in-out infinite alternate;
			}
			@keyframes rh-mane-flap {
				0%   { transform: skewX(2deg); }
				100% { transform: skewX(-8deg); }
			}

			.racehorse #racehorse-wrap {
				display: block;
			}

			/* Completion: freeze gallop, show standing pose, reveal trophy + confetti */
			.racehorse.racehorse-completed .rh-legs-a,
			.racehorse.racehorse-completed .rh-legs-b {
				display: none;
			}
			.racehorse.racehorse-completed .rh-legs-stand {
				opacity: 1;
			}
			.racehorse.racehorse-completed .rh-body-bob,
			.racehorse.racehorse-completed .rh-tail,
			.racehorse.racehorse-completed .rh-mane {
				animation: none;
				transform: none;
			}
			.racehorse.racehorse-completed .rh-dust {
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			.racehorse.racehorse-completed .rh-trophy,
			.racehorse.racehorse-completed .rh-confetti {
				opacity: 1;
			}

			.rh-confetti circle {
				transform-box: fill-box;
				transform-origin: center;
			}
			.racehorse.racehorse-completed .rh-confetti circle {
				animation: rc-confetti 1.6s ease-in-out infinite;
			}
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(1) { animation-delay: 0s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(2) { animation-delay: 0.18s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(3) { animation-delay: 0.36s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(4) { animation-delay: 0.54s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(5) { animation-delay: 0.72s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(6) { animation-delay: 0.90s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(7) { animation-delay: 1.08s; }
			.racehorse.racehorse-completed .rh-confetti circle:nth-child(8) { animation-delay: 1.26s; }

			/* ══════════════════════════════════════
			   STYLE: BOAT
			   ══════════════════════════════════════ */
			#boat-wrap {
				display: none;
				width: 100%;
			}
			#boat {
				display: block;
				width: 100%;
				height: auto;
			}
			.boat #boat-wrap { display: block; }
			.boat.homey-widget {
				padding: 0;
				padding-top: var(--homey-su-3);
				background: rgba(20, 100, 160, 0.55);
			}
			.boat #units-row { display: none !important; }
			/* Boat: sign at widget top edge, boat SVG at bottom of the flex-1 container */
			.boat #countdown-container {
				gap: 6px;
				justify-content: flex-end;
			}
			.boat .unit {
				min-width: 0;
				padding: 0 1px;
			}

			/* Hull stripe picks up user accent color */
			.bt-hull-stripe {
				fill: var(--countdown-accent, #f97316);
			}

			/* Flag and confetti hidden during countdown */
			.bt-flag,
			.bt-confetti {
				opacity: 0;
				transition: opacity 0.4s ease;
			}

			/* ── Spray particles ── */
			.bt-spray circle {
				transform-box: fill-box;
				transform-origin: center;
				animation: bt-spray 0.75s ease-out infinite;
				opacity: 0;
			}
			.bt-spray circle:nth-child(2) { animation-delay: 0.25s; }
			.bt-spray circle:nth-child(3) { animation-delay: 0.50s; }

			@keyframes bt-spray {
				0%   { transform: translate(0, 0) scale(0.5);       opacity: 0.75; }
				100% { transform: translate(-8px, -2px) scale(1.6); opacity: 0; }
			}

			/* ── Wake lines shimmer ── */
			.bt-wake-lines line {
				animation: bt-wake-shimmer 0.9s ease-in-out infinite alternate;
			}
			.bt-wake-lines line:nth-child(2) { animation-delay: 0.18s; }

			@keyframes bt-wake-shimmer {
				0%   { opacity: 0.60; }
				100% { opacity: 0.25; }
			}

			/* ── Background wave oscillation ── */
			.bt-wave-1 { animation: bt-wave-scroll 3.2s ease-in-out infinite alternate; }
			.bt-wave-2 { animation: bt-wave-scroll 4.1s ease-in-out infinite alternate-reverse; }
			.bt-wave-3 { animation: bt-wave-scroll 3.7s ease-in-out infinite alternate; }

			@keyframes bt-wave-scroll {
				0%   { transform: translateX(0); }
				100% { transform: translateX(8px); }
			}

			/* ── Bow wave bob ── */
			.bt-bow-wave {
				transform-box: fill-box;
				transform-origin: left center;
				animation: bt-bow-bob 0.4s ease-in-out infinite alternate;
			}
			@keyframes bt-bow-bob {
				0%   { transform: scaleY(1.0) translateX(0);    opacity: 0.65; }
				100% { transform: scaleY(0.7) translateX(1px);  opacity: 0.90; }
			}

			/* ── Boat: clock and colon styling (mirrors racecar/racehorse) ── */
			.boat .unit .value {
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 18px;
				font-weight: 700;
				line-height: 1;
				color: var(--countdown-clock, #ffb300);
				letter-spacing: 0.6px;
				font-variant-numeric: tabular-nums;
				text-shadow:
					0 0 4px var(--countdown-clock-85, rgba(255, 179, 0, 0.85)),
					0 0 9px var(--countdown-clock-40, rgba(255, 140, 0, 0.4)),
					0 1px 0 rgba(0, 0, 0, 0.6);
			}
			.boat .unit .label {
				display: block;
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 9px;
				line-height: 1;
				margin-top: 1px;
				color: var(--countdown-clock, #ffb300);
				opacity: 0.75;
				text-transform: lowercase;
				letter-spacing: 0.5px;
				text-shadow: 0 0 3px var(--countdown-clock-40, rgba(255, 140, 0, 0.4));
			}
			.boat .unit-sep {
				font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
				font-size: 18px;
				font-weight: 700;
				line-height: 1;
				color: var(--countdown-clock, #ffb300);
				opacity: 0.95;
				padding: 0 1px;
				margin-bottom: 10px;
				text-shadow:
					0 0 4px var(--countdown-clock-70, rgba(255, 179, 0, 0.7)),
					0 1px 0 rgba(0, 0, 0, 0.6);
				animation: rc-colon-blink 1s steps(1) infinite;
			}

			/* ── Boat: title as nautical dock/pier sign ── */
			.boat #title {
				font-family: 'Arial Black', 'Arial', sans-serif;
				font-size: 11px;
				font-weight: 900;
				letter-spacing: 0.8px;
				text-transform: uppercase;
				white-space: nowrap;
				text-overflow: ellipsis;
				color: #fff;
				background: #1a4a7a;
				border: 1.5px solid #0d2e4d;
				border-radius: 3px;
				padding: 4px 10px;
				margin: 0 14px;
				overflow: visible;
				z-index: 2;
				font-style: normal;
				box-shadow:
					0 2px 0 #0d2e4d,
					0 3px 6px rgba(0, 0, 0, 0.55);
			}
			/* Wooden piling posts below the sign */
			.boat #title::before,
			.boat #title::after {
				content: '';
				position: absolute;
				top: 100%;
				width: 4px;
				height: 22px;
				background: linear-gradient(to bottom, #8b6914, #5a3e0a);
				border-radius: 0 0 2px 2px;
			}
			.boat #title::before { left: 16%; }
			.boat #title::after  { right: 16%; }

			/* Board clip / label / time layout (same DOM as racecar/racehorse) */
			.boat #title .rc-board-clip {
				display: flex;
				align-items: center;
				overflow: hidden;
			}
			.boat #title .rc-board-clip .rc-label-wrap,
			.boat #title .rc-board-clip .rc-msg-wrap {
				flex: 1;
				min-width: 0;
				overflow: hidden;
			}
			.boat #title .rc-board-clip .rc-label,
			.boat #title .rc-board-clip .rc-msg {
				display: inline-block;
				white-space: nowrap;
			}
			.boat #title .rc-board-clip .rc-sep {
				flex-shrink: 0;
				opacity: 0.4;
				padding: 0 4px;
			}
			.boat #title .rc-board-clip .rc-time {
				flex-shrink: 0;
				font-variant-numeric: tabular-nums;
				letter-spacing: 0.5px;
			}
			.boat #title .rc-board-clip .rc-time--solo {
				flex: 1;
				text-align: center;
				letter-spacing: 1px;
			}

			/* ── Completion state ── */
			.boat.boat-completed .bt-spray {
				opacity: 0;
				transition: opacity 0.4s ease;
			}
			.boat.boat-completed .bt-wake-lines {
				opacity: 0;
				transition: opacity 0.4s ease;
			}
			.boat.boat-completed .bt-bow-wave {
				animation: none;
				transform: none;
			}
			.boat.boat-completed .bt-wave-1,
			.boat.boat-completed .bt-wave-2,
			.boat.boat-completed .bt-wave-3 {
				animation: none;
			}
			.boat.boat-completed .bt-flag,
			.boat.boat-completed .bt-confetti {
				opacity: 1;
			}
			.boat.boat-completed .bt-flag rect {
				transform-box: fill-box;
				transform-origin: 0% 50%;
				animation: rc-wave 0.7s ease-in-out infinite;
			}
			.bt-confetti circle {
				transform-box: fill-box;
				transform-origin: center;
			}
			.boat.boat-completed .bt-confetti circle {
				animation: rc-confetti 1.6s ease-in-out infinite;
			}
			.boat.boat-completed .bt-confetti circle:nth-child(1) { animation-delay: 0s; }
			.boat.boat-completed .bt-confetti circle:nth-child(2) { animation-delay: 0.18s; }
			.boat.boat-completed .bt-confetti circle:nth-child(3) { animation-delay: 0.36s; }
			.boat.boat-completed .bt-confetti circle:nth-child(4) { animation-delay: 0.54s; }
			.boat.boat-completed .bt-confetti circle:nth-child(5) { animation-delay: 0.72s; }
			.boat.boat-completed .bt-confetti circle:nth-child(6) { animation-delay: 0.90s; }
			.boat.boat-completed .bt-confetti circle:nth-child(7) { animation-delay: 1.08s; }
			.boat.boat-completed .bt-confetti circle:nth-child(8) { animation-delay: 1.26s; }
		</style>
	</head>

						</g>

						<!-- gallop frame B: front legs forward, hind legs back -->
						<g class="rh-legs-b">
							<rect class="rh-coat-shade" x="3"  y="14" width="1.4" height="6" rx="0.4" transform="rotate(-22 3.7 14)"/>
							<rect class="rh-coat"       x="5"  y="14" width="1.4" height="6" rx="0.4" transform="rotate(-22 5.7 14)"/>
							<rect class="rh-coat-shade" x="22" y="14" width="1.4" height="6" rx="0.4" transform="rotate(18 22.7 14)"/>
							<rect class="rh-coat"       x="24" y="14" width="1.4" height="6" rx="0.4" transform="rotate(18 24.7 14)"/>
							<!-- white socks, rotated with their parent legs -->
							<rect x="3"  y="18.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)" transform="rotate(-22 3.7 14)"/>
							<rect x="5"  y="18.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)" transform="rotate(-22 5.7 14)"/>
							<rect x="22" y="18.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)" transform="rotate(18 22.7 14)"/>
							<rect x="24" y="18.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)" transform="rotate(18 24.7 14)"/>
						</g>

						<!-- standing pose (shown on completion only) -->
						<g class="rh-legs-stand">
							<rect class="rh-coat-shade" x="4"  y="14" width="1.4" height="7" rx="0.4"/>
							<rect class="rh-coat"       x="6"  y="14" width="1.4" height="7" rx="0.4"/>
							<rect class="rh-coat-shade" x="21" y="14" width="1.4" height="7" rx="0.4"/>
							<rect class="rh-coat"       x="23" y="14" width="1.4" height="7" rx="0.4"/>
							<!-- white socks at the fetlock -->
							<rect x="4"  y="19.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)"/>
							<rect x="6"  y="19.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)"/>
							<rect x="21" y="19.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)"/>
							<rect x="23" y="19.4" width="1.4" height="1.6" rx="0.3" fill="rgba(255,255,255,0.95)"/>
						</g>

						<!-- barrel / body -->
						<path class="rh-coat"
							d="M 2 8 Q 4 6 10 6.5 L 18 7 Q 23 7.5 25 9 L 25 13 Q 23 14.5 18 14.5 L 10 14.5 Q 4 14 2 12 Z"/>

						<!-- neck -->
						<path class="rh-coat"
							d="M 21 6.5 L 26 4.5 L 28.5 4 L 28.5 7.5 L 25 9 Z"/>

						<!-- mane (animated) -->
						<path class="rh-mane rh-coat-shade"
							d="M 22 6 L 24 4.5 L 26 4 L 26 5.5 L 24.5 6.2 L 23 6.7 Z"/>

						<!-- head -->
						<path class="rh-coat"
							d="M 27 3.5 L 31.5 3 L 32.5 4.5 L 32 6.5 L 30 7.5 L 27 6.5 Z"/>

						<!-- white blaze running down the face for contrast -->
						<path d="M 29 3.6 L 30.3 3.4 L 30.7 5 L 30.1 6.9 L 29.4 6.9 L 28.9 5 Z"
							fill="rgba(255,255,255,0.92)"/>

						<!-- ear -->
						<path class="rh-coat-shade" d="M 28 3 L 28.5 1.6 L 29.6 2.7 Z"/>

						<!-- eye (light catch so it reads on the dark face) -->
						<circle cx="30.8" cy="5" r="0.4" fill="rgba(255,255,255,0.9)"/>

						<!-- saddle (under jockey) — leather brown, distinct from the dark coat -->
						<rect x="10.5" y="6" width="6.5" height="1.6" rx="0.5" fill="#6b4226"/>

						<!-- jockey's near-side leg straddling the horse: stirrup leather, bent leg, boot.
						     Drawn after the saddle so it overlays the saddle flap and the horse body. -->
						<line x1="14.4" y1="7.5" x2="15.7" y2="13.1" stroke="#3a2616" stroke-width="0.4"/>
						<path class="rh-silks" stroke="rgba(0,0,0,0.3)" stroke-width="0.18"
							d="M 14 6.3 L 16.5 6.3 L 18.2 9.5 L 18 11 L 17 13.5 L 15.5 13.5 L 16 10.5 L 14 7.5 Z"/>
						<!-- knee-high boot -->
						<rect x="14.5" y="13.2" width="3" height="1.5" rx="0.4" fill="#1a1a1a"/>
						<!-- boot rim highlight -->
						<rect x="14.5" y="13.2" width="3" height="0.4" rx="0.2" fill="rgba(255,255,255,0.35)"/>

						<!-- jockey silks (accent colour) — drawn last so it overlays the leg at the hip -->
						<path class="rh-silks"
							d="M 12 6 L 13.5 3 L 15.5 3 L 17 6 L 17 7 L 12 7 Z"/>

						<!-- jockey arm holding reins -->
						<rect class="rh-silks" x="16" y="5" width="3" height="0.7" rx="0.3"
							transform="rotate(-15 16 5)"/>

						<!-- reins from jockey's hand to horse's mouth -->
						<line x1="18.5" y1="4.6" x2="28" y2="6" stroke="#3a2616" stroke-width="0.3"/>

						<!-- jockey helmet -->
						<circle cx="14" cy="2.6" r="1.4" fill="#1a1a1a"/>
						<path d="M 13 2.8 L 14.5 2.4 L 14.6 3.2 Z" fill="rgba(255,255,255,0.5)"/>

					</g>
				</g>

				<!-- gold trophy (revealed on completion) -->
				<g class="rh-trophy" transform="translate(228,28)">
					<!-- handles -->
					<path d="M 0 3 Q -2 3 -2 5 Q -2 6.5 0 7"  stroke="#daa520" stroke-width="0.7" fill="none"/>
					<path d="M 8 3 Q 10 3 10 5 Q 10 6.5 8 7" stroke="#daa520" stroke-width="0.7" fill="none"/>
					<!-- cup bowl -->
					<path d="M 0 2 L 8 2 L 7.5 7 Q 4 9 0.5 7 Z"
						fill="#f5cc4a" stroke="#9c7a14" stroke-width="0.3"/>
					<!-- "1" engraved inside the bowl -->
					<text x="4" y="6.8" font-size="4" text-anchor="middle"
						fill="#7a5800" font-weight="900"
						font-family="-apple-system, system-ui, sans-serif">1</text>
					<!-- highlight -->
					<rect x="1" y="3" width="0.8" height="3.5" rx="0.3" fill="rgba(255,255,255,0.7)"/>
					<!-- stem -->
					<rect x="3.5" y="9" width="1" height="1.5" fill="#9c7a14"/>
					<!-- base -->
					<rect x="2" y="10.4" width="4" height="1.3" rx="0.3" fill="#daa520"/>
				</g>

			</svg></div>
			<div id="boat-wrap" class="dissolve-host"><svg id="boat" viewBox="0 0 250 50" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
				<defs>
					<linearGradient id="bt-sky-grad" x1="0" y1="0" x2="0" y2="1">
						<stop offset="0%"   stop-color="#87ceeb"/>
						<stop offset="100%" stop-color="#4fa8d5"/>
					</linearGradient>
					<linearGradient id="bt-water-grad" x1="0" y1="0" x2="0" y2="1">
						<stop offset="0%"   stop-color="#1e7bb8"/>
						<stop offset="50%"  stop-color="#155e8a"/>
						<stop offset="100%" stop-color="#0e4060"/>
					</linearGradient>
					<linearGradient id="bt-hull-shine" x1="0" y1="0" x2="0" y2="1">
						<stop offset="0%"   stop-color="rgba(255,255,255,0.40)"/>
						<stop offset="40%"  stop-color="rgba(255,255,255,0.00)"/>
						<stop offset="100%" stop-color="rgba(0,0,0,0.20)"/>
					</linearGradient>
					<pattern id="bt-buoy-stripe" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
						<rect x="0" y="0" width="4" height="2" fill="#f97316"/>
						<rect x="0" y="2" width="4" height="2" fill="#ffffff"/>
					</pattern>
					<pattern id="bt-checker" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
						<rect x="0" y="0" width="2" height="2" fill="#fff"/>
						<rect x="2" y="2" width="2" height="2" fill="#fff"/>
						<rect x="2" y="0" width="2" height="2" fill="#111"/>
						<rect x="0" y="2" width="2" height="2" fill="#111"/>
					</pattern>
				</defs>

				<!-- Sky band -->
				<rect x="0" y="0" width="250" height="14" fill="url(#bt-sky-grad)"/>

				<!-- Water surface -->
				<rect x="0" y="14" width="250" height="28" fill="url(#bt-water-grad)"/>

				<!-- Deep water strip -->
				<rect x="0" y="42" width="250" height="8" fill="rgba(10,40,60,0.70)"/>

				<!-- Horizon line -->
				<line x1="0" y1="14" x2="250" y2="14" stroke="rgba(255,255,255,0.30)" stroke-width="0.5"/>

				<!-- Wave crests -->
				<g class="bt-waves">
					<path class="bt-wave-1" d="M 0 20 Q 20 18.5 40 20 Q 60 21.5 80 20 Q 100 18.5 120 20 Q 140 21.5 160 20 Q 180 18.5 200 20 Q 220 21.5 240 20 L 250 20" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="0.8"/>
					<path class="bt-wave-2" d="M 0 26 Q 25 24.5 50 26 Q 75 27.5 100 26 Q 125 24.5 150 26 Q 175 27.5 200 26 Q 225 24.5 250 26"               fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="0.7"/>
					<path class="bt-wave-3" d="M 0 33 Q 30 31.5 60 33 Q 90 34.5 120 33 Q 150 31.5 180 33 Q 210 34.5 240 33 L 250 33"                          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
				</g>

				<!-- Finish buoy at x=224 -->
				<line x1="224" y1="38" x2="224" y2="44" stroke="rgba(80,80,80,0.60)" stroke-width="0.5"/>
				<ellipse cx="224" cy="28" rx="3.5" ry="5" fill="url(#bt-buoy-stripe)" stroke="rgba(0,0,0,0.30)" stroke-width="0.4"/>
				<ellipse cx="224" cy="23.2" rx="3.5" ry="1.2" fill="#e05500" stroke="rgba(0,0,0,0.30)" stroke-width="0.3"/>
				<line x1="224" y1="12" x2="224" y2="23" stroke="rgba(80,80,80,0.75)" stroke-width="0.6"/>
				<!-- Checkered flag (revealed on completion) -->
				<g class="bt-flag">
					<rect x="224" y="12" width="10" height="6" fill="url(#bt-checker)" stroke="rgba(0,0,0,0.40)" stroke-width="0.3"/>
				</g>

				<!-- Confetti burst at finish (hidden during countdown) -->
				<g class="bt-confetti">
					<circle cx="216" cy="10" r="1.4" fill="var(--countdown-accent, #f97316)"/>
					<circle cx="224" cy="6"  r="1.6" fill="#ffd84a"/>
					<circle cx="232" cy="10" r="1.3" fill="#4ad1ff"/>
					<circle cx="240" cy="8"  r="1.5" fill="#5fdc7d"/>
					<circle cx="208" cy="8"  r="1.4" fill="#ffd84a"/>
					<circle cx="200" cy="11" r="1.3" fill="var(--countdown-accent, #f97316)"/>
					<circle cx="247" cy="11" r="1.4" fill="#ff5a7a"/>
					<circle cx="192" cy="9"  r="1.4" fill="#4ad1ff"/>
				</g>

				<!-- Boat group (translated each tick) -->
				<g id="bt-boat" transform="translate(2,20)">

					<!-- Wake diverging lines -->
					<g class="bt-wake-lines">
						<line x1="-12" y1="2"  x2="0" y2="6" stroke="rgba(255,255,255,0.45)" stroke-width="0.6"/>
						<line x1="-12" y1="10" x2="0" y2="6" stroke="rgba(255,255,255,0.45)" stroke-width="0.6"/>
					</g>

					<!-- Spray particles -->
					<g class="bt-spray">
						<circle cx="-3" cy="5"   r="1.6" fill="rgba(200,230,255,0.65)"/>
						<circle cx="-5" cy="5.5" r="2.0" fill="rgba(200,230,255,0.50)"/>
						<circle cx="-1" cy="4.5" r="1.2" fill="rgba(200,230,255,0.40)"/>
					</g>

					<!-- Ground shadow -->
					<ellipse cx="14" cy="8.5" rx="14" ry="1.0" fill="rgba(0,0,0,0.25)"/>

					<!-- Lower hull (dark navy) -->
					<path d="M 0 5 L 0 8 Q 14 9.5 28 8 L 29 6.5 Q 22 5.5 14 5.5 Z" fill="#0a1828"/>

					<!-- Hull accent stripe -->
					<path class="bt-hull-stripe" d="M 1 7 Q 14 8.5 27 7.5 L 28.5 6.8 Q 22 6.2 14 6.2 L 1 6.5 Z"/>

					<!-- Upper deck (off-white) -->
					<path d="M 2 5 L 3 2.5 Q 10 1 18 1.5 L 24 2 L 27 3.5 L 28.5 5 Q 22 4.8 14 4.8 Z" fill="#dde8f0"/>
					<path d="M 2 5 L 3 2.5 Q 10 1 18 1.5 L 24 2 L 27 3.5 L 28.5 5 Q 22 4.8 14 4.8 Z" fill="url(#bt-hull-shine)"/>

					<!-- Cockpit windshield -->
					<path d="M 14 1.8 L 16 0.5 L 20 0.8 L 22 2.2 L 22 3.8 L 14 3.5 Z" fill="rgba(30,60,100,0.80)"/>
					<path d="M 15 1.5 L 17 0.8 L 18.5 1.8 L 16 2.5 Z" fill="rgba(255,255,255,0.30)"/>

					<!-- Engine cowl -->
					<rect x="7" y="1.5" width="6" height="2" rx="0.8" fill="#c8d8e8"/>

					<!-- Pilot silhouette -->
					<rect x="16" y="1.5" width="2.5" height="2" rx="0.5" fill="rgba(30,30,30,0.85)"/>
					<circle cx="17.2" cy="1.0" r="1.1" fill="#1a1a1a"/>
					<path d="M 16.8 0.5 A 0.7 0.7 0 0 1 17.8 0.9 L 17.2 1.1 Z" fill="rgba(255,255,255,0.45)"/>

					<!-- Navigation lights -->
					<circle cx="1.5"  cy="4.5" r="0.6" fill="rgba(220,50,50,0.90)"/>
					<circle cx="27.5" cy="4.5" r="0.6" fill="rgba(50,200,80,0.90)"/>

					<!-- Bow wave -->
					<path class="bt-bow-wave" d="M 28 5.5 Q 30 5 31 6 Q 30 7 28.5 6.5 Z" fill="rgba(255,255,255,0.65)"/>

				</g>

			</svg></div>
			<div id="units-row" class="dissolve-host">
				<div class="unit" id="unit-days">
					<svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
						<circle class="ring-bg" cx="18" cy="18" r="15.5"/>
						<circle class="ring-fg" cx="18" cy="18" r="15.5"/>
					</svg>
					<span class="value" id="days"><span class="digit">-</span><span class="digit">-</span></span>
					<span class="label">d</span>
				</div>
				<div class="unit-sep" id="sep-hours">:</div>
				<div class="unit" id="unit-hours">
					<svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
						<circle class="ring-bg" cx="18" cy="18" r="15.5"/>
						<circle class="ring-fg" cx="18" cy="18" r="15.5"/>
					</svg>
					<span class="value" id="hours"><span class="digit">-</span><span class="digit">-</span></span>
					<span class="label">h</span>
				</div>
				<div class="unit-sep" id="sep-minutes">:</div>
				<div class="unit" id="unit-minutes">
					<svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
						<circle class="ring-bg" cx="18" cy="18" r="15.5"/>
						<circle class="ring-fg" cx="18" cy="18" r="15.5"/>
					</svg>
					<span class="value" id="minutes"><span class="digit">-</span><span class="digit">-</span></span>
					<span class="label">m</span>
				</div>
				<div class="unit-sep" id="sep-seconds">:</div>
				<div class="unit" id="unit-seconds">
					<svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
						<circle class="ring-bg" cx="18" cy="18" r="15.5"/>
						<circle class="ring-fg" cx="18" cy="18" r="15.5"/>
					</svg>
					<span class="value" id="seconds"><span class="digit">-</span><span class="digit">-</span></span>
					<span class="label">s</span>
				</div>
			</div>
			<div id="completion-message"></div>
		</div>
		<script defer src="script.mjs"></script>
	</body>
</html>
