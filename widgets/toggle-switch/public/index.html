<html>
	<head>
		<link href="https://use.fontawesome.com/releases/v5.0.1/css/all.css" rel="stylesheet" />

		<style>
			body {
				display: flex;
				justify-content: flex-start;
				align-items: center;
				width: 100%;
				height: 100vh;
				box-sizing: border-box;
				padding: 0 1em;
			}

			.metadata {
				flex-grow: 1;
				margin-right: 1em;
				min-width: 0;
				display: flex;
				align-items: center;
			}

			.title {
				overflow: hidden;
				white-space: nowrap;
				text-overflow: ellipsis;
				width: 100%;
			}

			.switch-container {
				font-size: 3px;
				width: 24em;
				height: 10em;
				border-radius: 10em;
				/* box-shadow: 5px 5px 15px 5px #cfd8dc; */
				box-shadow: 2px 2px 10px 2px var(--homey-color-mono-100);
				position: relative;
				margin-left: auto;
				flex-shrink: 0;
			}

			.switch-color {
				width: 22em;
				height: 8em;
				left: 1em;
				top: 1em;
				background: var(--homey-color-mono-100);
				border-radius: 10em;
				z-index: -1;
				position: absolute;
				transition: all 500ms cubic-bezier(0.34, 1.36, 0.2, 1);
			}

			label {
				width: 8em;
				height: 8em;
				border-radius: 10em;
				background: white;
				position: absolute;
				top: 1em;
				left: 1em;
				box-shadow: 2px 2px 10px 2px var(--homey-color-mono-100);
				z-index: 99;
				cursor: pointer;
			}

			label::before {
				font-family: 'Font Awesome 5 Free';
				font-weight: 900;
				font-size: 5em;
				content: '\f00d';
				position: absolute;
				left: 0.42em;
				top: 0.3em;
				color: #e9182a;
			}

			label::after {
				font-family: 'Font Awesome 5 Free';
				font-weight: 900;
				font-size: 5em;
				content: '\f00c';
				position: absolute;
				left: 0.3em;
				top: 0.3em;
				opacity: 0;
				color: #00e676;
			}

			#switch:checked ~ label::before {
				opacity: 0;
			}

			#switch:checked ~ label::after {
				opacity: 1;
			}

			#switch:checked ~ label {
				transform: translatex(14em) rotatez(360deg);
			}

			#switch:checked ~ .switch-color {
				background: #00e676;
			}

			#switch ~ label {
				transition: all 1s cubic-bezier(0.34, 1.36, 0.2, 1);
			}

			input {
				display: none;
			}

			#icon {
				width: 20px;
				height: 20px;
				background-size: contain;
				background-repeat: no-repeat;
				margin-right: 10px;
				display: flex;
				align-items: center;
			}
		</style>
	</head>

	<body class="homey-widget">
		<div class="metadata">
			<div id="icon" style="display: none;"></div>
			<div class="title homey-text-small-light"></div>
		</div>
		<div class="switch-container">
			<input type="checkbox" id="switch" disabled />
			<div class="switch-color"></div>
			<label for="switch"></label>
		</div>

		<script defer src="script.mjs"></script>
	</body>
</html>
