<html>
	<head>
		<style>
			.homey-widget {
				width: 100%;
				flex-direction: column;
				padding: 10px;
			}

			.container {
				width: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
				height: 25px;
			}

			.title {
				margin-top: 5px;
				width: 100%;
				text-align: left;
				overflow: hidden;
				white-space: nowrap;
				text-overflow: ellipsis;
			}

			body {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				font-family: Arial, sans-serif;
			}

			.metric-container {
				width: 100%;
				text-align: center;
			}

			#progressPercentage {
				font-size: 14px;
				margin-right: 10px;
				height: 23px;
				position: absolute;
				left: 50%;
				top: 6px;
				transform: translateX(-50%);
				z-index: 1;
				color: var(--homey-text-color);
				background-color: var(--homey-color-mono-000);
				border-radius: 1em;
				padding: 0 10px;
				opacity: 0.7;
				white-space: nowrap;
			}

			.bar-container {
				border-radius: 15px;
				overflow: hidden;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			}

			#metricBackground {
				height: 35px;
				width: 100%;
				position: relative;
			}

			#metricBar {
				height: 35px;
				width: 0%;
				transition: width 0.5s ease-in-out;
				background-color: var(--homey-color-primary);
			}

			#icon {
				width: 20px;
				height: 20px;
				background-size: contain;
				background-repeat: no-repeat;
				margin-right: 10px;
				align-items: center;
			}
		</style>
	</head>

	<body class="homey-widget">
		<div class="container">
			<div style="display: flex; align-items: center">
				<div id="icon" style="display: none"></div>
			</div>
			<div class="metric-container">
				<div class="bar-container" style="background-color: var(--homey-color-mono-200)">
					<div id="metricBackground" style="background-color: var(--homey-color-mono-200)">
						<div id="metricBar"></div>
						<div id="progressPercentage" class="homey-text-small-light">0%</div>
					</div>
				</div>
			</div>
		</div>
		<div class="title homey-text-small-light" style="display: none"></div>
		<script defer src="script.mjs"></script>
	</body>
</html>
